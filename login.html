<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Smart Community</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="card shadow-sm p-4" style="width: 100%; max-width: 420px;">
    
    <!-- Logo / Title -->
    <div class="text-center mb-4">
      <h4 class="fw-bold text-primary">🏘️ Smart Community</h4>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    <!-- Error Alert -->
    <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

    <!-- Login Form -->
    <div id="loginForm">

      <div class="mb-3">
        <label class="form-label fw-semibold">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com"/>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password"/>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Login as</label>
        <select id="role" class="form-select">
          <option value="">-- Select Role --</option>
          <option value="admin">Admin</option>
          <option value="resident">Resident</option>
        </select>
      </div>

      <button onclick="handleLogin()" class="btn btn-primary w-100 fw-semibold">Login</button>

    </div>

    <hr/>
    <p class="text-center text-muted small mb-0">
      Don't have an account? 
      <a href="register.html" class="text-primary fw-semibold">Register here</a>
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const role = document.getElementById('role').value;
      const errorAlert = document.getElementById('errorAlert');

      // Hide previous errors
      errorAlert.classList.add('d-none');

      // Validation
      if (!email || !password || !role) {
        errorAlert.textContent = 'Please fill in all fields.';
        errorAlert.classList.remove('d-none');
        return;
      }

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        errorAlert.textContent = 'Please enter a valid email address.';
        errorAlert.classList.remove('d-none');
        return;
      }

      if (password.length < 6) {
        errorAlert.textContent = 'Password must be at least 6 characters.';
        errorAlert.classList.remove('d-none');
        return;
      }

      // Save to localStorage
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userRole', role);
      localStorage.setItem('isLoggedIn', 'true');

      // Redirect to dashboard
      window.location.href = 'index.html';
    }

    // If already logged in, skip login
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
